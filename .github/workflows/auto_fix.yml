name: Auto-fix Image Files

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    name: Auto-fix Images (EXIF & Size)
    # 限制只有当评论包含 /auto-fix，且是在拉取请求上，同时评论者有权限时才执行
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/auto-fix' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.comment.user.login == github.event.issue.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge command and start processing
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "rocket"
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🚀 自动修复工作中...(Auto-fix initiated! Processing images...)"
            });

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git identity and auth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Checkout PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Checkout PR branch using github CLI
          gh pr checkout ${{ github.event.issue.number }}

      - name: Install dependencies
        run: |
          command -v exiftool && command -v mogrify && exit 0
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libimage-exiftool-perl imagemagick jpegoptim optipng

      - name: Get list of changed image files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use gh pr diff to fetch only the names of modified/added files
          gh pr diff ${{ github.event.issue.number }} --name-only | grep -iE '\.(jpe?g|png|webp|tiff?|hei[cf]|avif|gif)$' > changed_images.txt || true
          
          if [ ! -s changed_images.txt ]; then
            echo "No images changed in this PR."
            exit 0
          fi
          
          echo "Changed images to process:"
          cat changed_images.txt

      - name: Process Phase 1 - Remove EXIF Data
        run: |
          if [ ! -s changed_images.txt ]; then exit 0; fi
          
          exif_files_changed=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              # Count EXIF tags
              count=$(exiftool -EXIF:all -S -q -- "$file" 2>/dev/null | wc -l || echo 0)
              if [ "$count" -gt 0 ]; then
                echo "Removing EXIF: $file"
                exiftool -all= -overwrite_original "$file"
                exif_files_changed=1
              fi
            fi
          done < changed_images.txt

          if [ "$exif_files_changed" -eq 1 ]; then
            git add .
            git commit -m "chore: auto-remove EXIF data from images" || true
          fi

      - name: Process Phase 2 - Compress Oversized Images
        run: |
          if [ ! -s changed_images.txt ]; then exit 0; fi
          
          size_files_changed=0
          MAX_SIZE=$((1024 * 1024)) # 1MB Limit
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt "$MAX_SIZE" ]; then
                echo "Compressing: $file ($size bytes)"
                
                # Check extension for appropriate lossless/lossy strategy
                ext="${file##*.}"
                ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
                
                case "$ext_lower" in
                  jpg|jpeg)
                    # jpegoptim reduces quality to meet size target
                    jpegoptim --size=990k "$file" || mogrify -quality 80 "$file"
                    ;;
                  png)
                    # optipng achieves lossless compression
                    optipng -o2 "$file"
                    
                    # If still oversized, fallback to mogrify (lossy output, but keeps resolution/extension)
                    new_size=$(stat -c%s "$file" 2>/dev/null || echo 0)
                    if [ "$new_size" -gt "$MAX_SIZE" ]; then
                       echo "PNG still >1MB after lossless optipng. Using mogrify."
                       mogrify -quality 80 "$file"
                    fi
                    ;;
                  *)
                    # Universal approach for WebP/GIF/HEIC to limit size/quality
                    mogrify -quality 80 "$file"
                    ;;
                esac
                size_files_changed=1
              fi
            fi
          done < changed_images.txt

          if [ "$size_files_changed" -eq 1 ]; then
            git add .
            git commit -m "chore: auto-compress oversized images" || true
          fi

      - name: Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If we have local commits that are not in the upstream branch yet, push them.
          if ! git diff --quiet @{u}...HEAD; then
            echo "Pushing changes back to the PR branch..."
            git push
          else
            echo "No changes made during processing."
          fi

      - name: Report Completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { conclusion } = context.job;
            const message = conclusion === 'success' 
              ? "✅ **自动修复成功 (Auto-fix completed successfully)!**\nEXIF 信息已被移除且文件已被压缩（如有必要）。(EXIF data removed and files compressed if needed. Check the latest commits.)"
              : "❌ **自动修复失败 (Auto-fix failed).**\n请查看 [Actions Log](" + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId + ") 获取详细信息。 (Please check the Actions Log for details.)";
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
